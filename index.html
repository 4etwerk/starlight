<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>a little universe for you ✮ ⋆ ˚｡𖦹 ⋆｡°✩</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
overflow:hidden;
background:black;
color:white;
font-family:"Playfair Display",serif;
}

canvas{
position:absolute;
top:0;
left:0;
}

.text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
width:85%;
max-width:600px;
font-size:clamp(18px,4vw,32px);
line-height:1.7;
letter-spacing:0.5px;
padding:10px;

animation:glow 4s ease-in-out infinite alternate;

text-shadow:
0 0 8px rgba(255,255,255,0.3),
0 0 25px rgba(255,120,150,0.25);
}

@keyframes glow{

0%{
opacity:0.6;
text-shadow:
0 0 6px rgba(255,255,255,0.2),
0 0 10px rgba(255,120,150,0.1);
}

100%{
opacity:1;
text-shadow:
0 0 14px rgba(255,255,255,0.7),
0 0 40px rgba(255,120,150,0.4);
}

}

</style>
</head>

<body>

<canvas id="canvas"></canvas>
<div class="text" id="text"></div>

<audio id="music" src="music.mp3"></audio>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const colors=["white","#ff9acb","#ff6fae","#ffd1e6"];

function heart(t){
return{
x:16*Math.pow(Math.sin(t),3),
y:-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))
};
}

let particles=[];
let explode=false;
let galaxy=false;

for(let i=0;i<700;i++){

let t=Math.random()*Math.PI*2;
let h=heart(t);

particles.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,

tx:canvas.width/2+h.x*13,
ty:canvas.height/2+h.y*13,

vx:(Math.random()-0.5)*3,
vy:(Math.random()-0.5)*3,

type:"star",

color:colors[Math.floor(Math.random()*colors.length)],

twinkle:Math.random()*6.28,
twinkleSpeed:Math.random()*0.02+0.01

});

}

function animate(){

ctx.fillStyle="rgba(0,0,0,0.2)";
ctx.fillRect(0,0,canvas.width,canvas.height);

let cx=canvas.width/2;
let cy=canvas.height/2;

for(let p of particles){

if(!explode){

p.x+=(p.tx-p.x)*0.03;
p.y+=(p.ty-p.y)*0.03;

}else{

if(galaxy && !p.firework){

let dx=p.x-cx;
let dy=p.y-cy;

let angle=Math.atan2(dy,dx)+0.002;
let dist=Math.sqrt(dx*dx+dy*dy);

p.x=cx+Math.cos(angle)*dist;
p.y=cy+Math.sin(angle)*dist;

}else{

p.x+=p.vx;
p.y+=p.vy;

}

}

if(p.type==="heart"){

ctx.beginPath();
ctx.arc(p.x,p.y,2.3,0,Math.PI*2);
ctx.fillStyle="#ff6fae";
ctx.fill();

}else{

p.twinkle+=p.twinkleSpeed;

let alpha=(Math.sin(p.twinkle)+1)/2;

ctx.globalAlpha=0.4+alpha*0.6;

ctx.beginPath();
ctx.arc(p.x,p.y,1.5,0,Math.PI*2);
ctx.fillStyle=p.color;
ctx.fill();

ctx.globalAlpha=1;

}

}

requestAnimationFrame(animate);

}

animate();


const message=`we met not so long ago,

but somehow
you already made the world
feel a little more beautiful.

and i just wanted you to know that.`

function typeText(){

let i=0;
let el=document.getElementById("text");

let interval=setInterval(()=>{

el.innerHTML+=message[i];
i++;

if(i>=message.length) clearInterval(interval);

},50);

}

setTimeout(()=>{

explode=true;

for(let p of particles){

p.vx=(Math.random()-0.5)*1.2;
p.vy=(Math.random()-0.5)*1.2;

p.type=Math.random()<0.6?"heart":"star";

}

setTimeout(typeText,1200);

setTimeout(()=>{

galaxy=true;

},15000);

},8000);


function comet(){

let x=Math.random()*canvas.width;
let y=0;

let vx=(Math.random()-0.5)*2;
let vy=6;

let color=Math.random()>0.5?"white":"#ff9acb";

let interval=setInterval(()=>{

ctx.beginPath();
ctx.arc(x,y,2,0,Math.PI*2);
ctx.fillStyle=color;
ctx.fill();

x+=vx;
y+=vy;

if(y>canvas.height) clearInterval(interval);

},25);

}

setInterval(comet,2200);


canvas.addEventListener("click",e=>{

for(let i=0;i<35;i++){

particles.push({

x:e.clientX,
y:e.clientY,

vx:(Math.random()-0.5)*6,
vy:(Math.random()-0.5)*6,

firework:true,

type:Math.random()<0.5?"heart":"star",

color:colors[Math.floor(Math.random()*colors.length)],

twinkle:Math.random()*6.28,
twinkleSpeed:Math.random()*0.02+0.01

});

}

startMusic();

});


let musicStarted=false;

function startMusic(){

if(musicStarted) return;

musicStarted=true;

let m=document.getElementById("music");

m.volume=1;
m.play();

}

</script>

</body>
</html>
