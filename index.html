<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>a little universe for you ✮ ⋆ ˚｡𖦹 ⋆｡°✩</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
overflow:hidden;
background:black;
color:white;
font-family:"Playfair Display",serif;
}

canvas{
position:absolute;
top:0;
left:0;
}

.text{

position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);

text-align:center;

width:85%;
max-width:600px;

font-size:clamp(18px,4vw,32px);
line-height:1.7;
letter-spacing:0.5px;

padding:10px;

animation:glow 4s ease-in-out infinite alternate;

text-shadow:
0 0 8px rgba(255,255,255,0.3),
0 0 25px rgba(255,120,150,0.25);

}

@keyframes glow{

0%{
opacity:0.6;
text-shadow:
0 0 6px rgba(255,255,255,0.2),
0 0 10px rgba(255,120,150,0.1);
}

100%{
opacity:1;
text-shadow:
0 0 14px rgba(255,255,255,0.7),
0 0 40px rgba(255,120,150,0.4);
}

}

</style>

</head>

<body>

<canvas id="canvas"></canvas>
<div class="text" id="text"></div>

<audio id="music" src="music.mp3"></audio>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

/* colors */

const starColors=["white","#ff9acb","#ff6fae","#ffd1e6"];

/* heart formula */

function heart(t){
return{
x:16*Math.pow(Math.sin(t),3),
y:-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))
};
}

let particles=[];

/* more stars */

for(let i=0;i<1100;i++){

let t=Math.random()*Math.PI*2;
let h=heart(t);

particles.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,

tx:canvas.width/2+h.x*13,
ty:canvas.height/2+h.y*13,

vx:(Math.random()-0.5)*3,
vy:(Math.random()-0.5)*3,

heart:true,
symbol:"star",

color:starColors[Math.floor(Math.random()*starColors.length)]

});

}

let explode=false;

/* animation */

function animate(){

ctx.fillStyle="rgba(0,0,0,0.25)";
ctx.fillRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

if(!explode){

p.x+=(p.tx-p.x)*0.03;
p.y+=(p.ty-p.y)*0.03;

}else{

p.x+=p.vx;
p.y+=p.vy;

}

if(p.symbol==="heart"){

ctx.font="10px Arial";
ctx.fillStyle=p.color;
ctx.fillText("❤",p.x,p.y);

}else{

ctx.beginPath();
ctx.arc(p.x,p.y,1.6,0,Math.PI*2);
ctx.fillStyle=p.color;
ctx.fill();

}

});

requestAnimationFrame(animate);

}

animate();

/* message */

const message=`we met not so long ago,

but somehow
you already made the world
feel a little more beautiful.

and i just wanted you to know that.`

function typeText(){

let i=0;
let el=document.getElementById("text");

let interval=setInterval(()=>{

el.innerHTML+=message[i];
i++;

if(i>=message.length) clearInterval(interval);

},50);

}

/* slower explosion */

setTimeout(()=>{

explode=true;

particles.forEach(p=>{

p.heart=false;

/* slower explosion */

p.vx=(Math.random()-0.5)*1.5;
p.vy=(Math.random()-0.5)*1.5;

p.symbol=Math.random()<0.25?"heart":"star";

});

setTimeout(typeText,1000);

},8000);

/* more comets */

function comet(){

let x=Math.random()*canvas.width;
let y=0;

let vx=(Math.random()-0.5)*2;
let vy=7;

let color=Math.random()>0.5?"white":"#ff9acb";

let interval=setInterval(()=>{

ctx.beginPath();
ctx.arc(x,y,2,0,Math.PI*2);
ctx.fillStyle=color;
ctx.fill();

x+=vx;
y+=vy;

if(y>canvas.height) clearInterval(interval);

},20);

}

setInterval(comet,1200);

/* fireworks */

canvas.addEventListener("click",e=>{

let heartFirework=Math.random()<0.5;

for(let i=0;i<40;i++){

particles.push({

x:e.clientX,
y:e.clientY,

tx:e.clientX,
ty:e.clientY,

vx:(Math.random()-0.5)*6,
vy:(Math.random()-0.5)*6,

heart:false,

symbol:heartFirework?"heart":"star",

color:starColors[Math.floor(Math.random()*starColors.length)]

});

}

startMusic();

});

/* music */

let musicStarted=false;

function startMusic(){

if(musicStarted) return;

musicStarted=true;

let m=document.getElementById("music");

m.volume=1;
m.play();

}

</script>

</body>
</html>
