<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>a little universe for you ✮ ⋆ ˚｡𖦹 ⋆｡°✩</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:"Playfair Display",serif;
}

canvas{
position:absolute;
top:0;
left:0;
}

.text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
width:85%;
max-width:600px;
font-size:clamp(18px,4vw,32px);
line-height:1.7;
letter-spacing:0.5px;
padding:10px;
color:white;

animation:glow 4s ease-in-out infinite alternate;
}

@keyframes glow{
0%{opacity:0.6}
100%{opacity:1}
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>
<div class="text" id="text"></div>
<audio id="music" src="music.mp3"></audio>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const colors=["white","#ff9acb","#ffd1e6"];

let particles=[];
let preStars=[];

let explode=false;
let galaxy=false;

/* heart equation */

function heart(t){
return{
x:16*Math.pow(Math.sin(t),3),
y:-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))
};
}

/* create heart */

for(let i=0;i<550;i++){

let t=Math.random()*Math.PI*2;
let h=heart(t);

particles.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,

tx:canvas.width/2+h.x*12,
ty:canvas.height/2+h.y*12,

vx:(Math.random()-0.5)*2,
vy:(Math.random()-0.5)*2,

type:"star",

color:colors[Math.floor(Math.random()*colors.length)],

twinkle:Math.random()*6

});

}

/* draw heart */

function drawHeart(x,y,size){

ctx.beginPath();

ctx.moveTo(x,y);

ctx.bezierCurveTo(
x,y-size,
x-size,y-size,
x-size,y
);

ctx.bezierCurveTo(
x-size,y+size,
x,y+size*1.3,
x,y+size*1.8
);

ctx.bezierCurveTo(
x,y+size*1.3,
x+size,y+size,
x+size,y
);

ctx.bezierCurveTo(
x+size,y-size,
x,y-size,
x,y
);

ctx.fillStyle="#ff6fae";
ctx.fill();

}

/* animation */

function animate(){

ctx.fillStyle="rgba(0,0,0,0.25)";
ctx.fillRect(0,0,canvas.width,canvas.height);

let cx=canvas.width/2;
let cy=canvas.height/2;

for(let p of particles){

if(!explode){

p.x+=(p.tx-p.x)*0.04;
p.y+=(p.ty-p.y)*0.04;

}else{

if(galaxy && !p.firework){

let dx=p.x-cx;
let dy=p.y-cy;

let angle=Math.atan2(dy,dx)+0.002;
let dist=Math.sqrt(dx*dx+dy*dy);

p.x=cx+Math.cos(angle)*dist;
p.y=cy+Math.sin(angle)*dist;

}else{

p.x+=p.vx;
p.y+=p.vy;

}

}

if(p.type==="heart"){

drawHeart(p.x,p.y,2);

}else{

p.twinkle+=0.02;

let alpha=(Math.sin(p.twinkle)+1)/2;

ctx.globalAlpha=0.5+alpha*0.5;

ctx.beginPath();
ctx.arc(p.x,p.y,1.5,0,Math.PI*2);
ctx.fillStyle=p.color;
ctx.fill();

ctx.globalAlpha=1;

}

}

/* pre-click stars */

for(let s of preStars){

ctx.beginPath();
ctx.arc(s.x,s.y,2,0,Math.PI*2);
ctx.fillStyle="white";
ctx.fill();

}

requestAnimationFrame(animate);

}

animate();

/* text */

const message=`we met not so long ago,

but somehow
you already made the world
feel a little more beautiful.

and i just wanted you to know that.`

function typeText(){

let i=0;
let el=document.getElementById("text");

let interval=setInterval(()=>{

el.innerHTML+=message[i];
i++;

if(i>=message.length) clearInterval(interval);

},50);

}

/* explosion */

setTimeout(()=>{

explode=true;

/* convert pre stars */

for(let s of preStars){

for(let i=0;i<18;i++){

particles.push({

x:s.x,
y:s.y,

vx:(Math.random()-0.5)*5,
vy:(Math.random()-0.5)*5,

firework:true,

type:"heart"

});

}

}

preStars=[];

/* main explosion */

for(let p of particles){

p.vx=(Math.random()-0.5)*1.1;
p.vy=(Math.random()-0.5)*1.1;

p.type=Math.random()<0.75?"heart":"star";

}

setTimeout(typeText,1200);

setTimeout(()=>{

galaxy=true;

},14000);

},8000);

/* comets */

function comet(){

let x=Math.random()*canvas.width;
let y=0;

let vx=(Math.random()-0.5)*2;
let vy=6;

let interval=setInterval(()=>{

ctx.beginPath();
ctx.arc(x,y,2,0,Math.PI*2);
ctx.fillStyle=Math.random()>0.5?"white":"#ff9acb";
ctx.fill();

x+=vx;
y+=vy;

if(y>canvas.height) clearInterval(interval);

},30);

}

setInterval(comet,2500);

/* click interaction */

canvas.addEventListener("click",e=>{

if(!explode){

preStars.push({
x:e.clientX,
y:e.clientY
});

}else{

for(let i=0;i<22;i++){

particles.push({

x:e.clientX,
y:e.clientY,

vx:(Math.random()-0.5)*5,
vy:(Math.random()-0.5)*5,

firework:true,

type:Math.random()<0.5?"heart":"star"

});

}

}

startMusic();

});

/* music */

let musicStarted=false;

function startMusic(){

if(musicStarted) return;

musicStarted=true;

document.getElementById("music").play();

}

</script>

</body>
</html>
